{% extends 'base.html' %}
{% block page_title %}{{ 'Edit User' if user else 'Add User' }}{% endblock %}
{% block subtitle %}Assign a role to limit application access{% endblock %}
{% block content %}
<section class="panel narrow">
  <form method="post" class="form-grid single">
    <label>Full Name
      <input name="full_name" required value="{{ user.full_name if user else '' }}" placeholder="e.g. Mary Banda">
    </label>
    <label>Username
      <input name="username" required value="{{ user.username if user else '' }}" {% if user %}readonly{% endif %} placeholder="e.g. mary">
    </label>
    <label>Role
      <select name="role" required>
        {% for role in roles %}
          <option value="{{ role }}" {% if user and user.role == role %}selected{% endif %}>{{ role }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Password {% if user %}<small>Leave blank to keep current password</small>{% endif %}
      <input name="password" type="password" {% if not user %}required{% endif %} placeholder="Enter password">
    </label>
    <label class="check-row">
      <input type="checkbox" name="active" value="1" {% if not user or user.active %}checked{% endif %}>
      Active user account
    </label>
    <div class="actions">
      <a class="btn" href="{{ url_for('users') }}">Cancel</a>
      <button class="primary" type="submit">Save User</button>
    </div>
  </form>
</section>
{% endblock %}
