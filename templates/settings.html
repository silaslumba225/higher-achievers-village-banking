{% extends 'base.html' %}
{% block page_title %}System Settings{% endblock %}
{% block subtitle %}Manage system-wide configuration{% endblock %}

{% block content %}
<!-- <label>Logo URL
  <input
    type="text"
    name="logo_url"
    value="{{ setting.logo_url or '' }}">
</label> -->

<section class="panel">
  <h2>System Settings</h2>

  <form method="post" class="form-grid">

    <label>Organization Name
      <input
        type="text"
        name="organization_name"
        value="{{ setting.organization_name }}"
        required>
    </label>

    <label>Monthly Contribution Amount
      <input
        type="number"
        step="0.01"
        name="contribution_amount"
        value="{{ setting.contribution_amount }}"
        required>
    </label>

    <label>Organization Address
    <input
        type="text"
        name="organization_address"
        value="{{ setting.organization_address or '' }}">
    </label>

    <label>Organization Phone
    <input
        type="text"
        name="organization_phone"
        value="{{ setting.organization_phone or '' }}">
    </label>

    <label>Organization Email
    <input
        type="email"
        name="organization_email"
        value="{{ setting.organization_email or '' }}">
    </label>

    <label>Registration Number
    <input
        type="text"
        name="registration_number"
        value="{{ setting.registration_number or '' }}">
    </label>

    <label>Savings Interest Rate (%)
      <input
        type="number"
        step="0.01"
        name="savings_interest_rate"
        value="{{ setting.savings_interest_rate }}"
        required>
    </label>

    <label>Loan Interest Rate (%)
      <input
        type="number"
        step="0.01"
        name="loan_interest_rate"
        value="{{ setting.loan_interest_rate }}"
        required>
    </label>

    <label>Welfare Contribution Amount
      <input
        type="number"
        step="0.01"
        name="welfare_contribution_amount"
        value="{{ setting.welfare_contribution_amount }}"
        required>
    </label>
    <label>Organization Address
        <input type="text" name="organization_address" value="{{ setting.organization_address or '' }}">
    </label>

    <label>Organization Phone
        <input type="text" name="organization_phone" value="{{ setting.organization_phone or '' }}">
    </label>

    <label>Organization Email
        <input type="email" name="organization_email" value="{{ setting.organization_email or '' }}">
    </label>

    <label>Registration Number
        <input type="text" name="registration_number" value="{{ setting.registration_number or '' }}">
    </label>
    <h3>SMS & WhatsApp Settings</h3>

    <label>SMS Provider
      <input type="text" name="sms_provider" value="{{ setting.sms_provider or 'Manual' }}">
    </label>

    <label>SMS API Key
      <input type="text" name="sms_api_key" value="{{ setting.sms_api_key or '' }}">
    </label>

    <label>SMS Sender ID
      <input type="text" name="sms_sender_id" value="{{ setting.sms_sender_id or '' }}">
    </label>

    <label>
      <input type="checkbox" name="whatsapp_enabled" {% if setting.whatsapp_enabled %}checked{% endif %}>
      Enable WhatsApp Messaging
    </label>

    <button type="submit" class="primary">
      Save Settings
    </button>

  </form>
</section>

{% endblock %}
