{% extends 'base.html' %}
{% block page_title %}System Settings{% endblock %}
{% block subtitle %}Manage system-wide configuration{% endblock %}

{% block content %}

<section class="panel">
  <h2>System Settings</h2>

  <form method="post" class="form-grid">

    <label>Organization Name
      <input
        type="text"
        name="organization_name"
        value="{{ setting.organization_name }}"
        required>
    </label>

    <label>Monthly Contribution Amount
      <input
        type="number"
        step="0.01"
        name="contribution_amount"
        value="{{ setting.contribution_amount }}"
        required>
    </label>

    <label>Savings Interest Rate (%)
      <input
        type="number"
        step="0.01"
        name="savings_interest_rate"
        value="{{ setting.savings_interest_rate }}"
        required>
    </label>

    <label>Loan Interest Rate (%)
      <input
        type="number"
        step="0.01"
        name="loan_interest_rate"
        value="{{ setting.loan_interest_rate }}"
        required>
    </label>

    <label>Welfare Contribution Amount
      <input
        type="number"
        step="0.01"
        name="welfare_contribution_amount"
        value="{{ setting.welfare_contribution_amount }}"
        required>
    </label>

    <button type="submit" class="primary">
      Save Settings
    </button>

  </form>
</section>

{% endblock %}
